<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Plane</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f5f1e8;
      color: #1f2933;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .icon {
      width: 140px;
      height: 140px;
      border-radius: 32px;
      margin-bottom: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 12px;
    }

    p {
      font-size: 17px;
      line-height: 1.5;
      color: #52616b;
      margin-bottom: 36px;
    }

    .cta {
      display: block;
      width: 100%;
      padding: 22px;
      border-radius: 18px;
      background: #22c55e;
      color: white;
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 0 #15803d;
      text-transform: uppercase;
    }

    .cta:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #15803d;
    }

    .small {
      margin-top: 22px;
      font-size: 13px;
      color: #7b8794;
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- Remplace icon.png par l’icône de ton jeu -->
    <img class="icon" src="icon.png" alt="Icône Pixel Plane" />

    <h1>Pixel Plane</h1>

    <p>
      Un petit jeu d’arcade rétro, simple et rapide.
      Essaie de battre ton meilleur score !
    </p>

    <a
      class="cta"
      href="https://play.google.com/store/apps/details?id=com.tomkogames.pixelplane"
      target="_blank"
      rel="noopener noreferrer"
    >
      Télécharger
    </a>

    <p class="small">Disponible gratuitement sur Google Play</p>

  </main>
</body>
</html>
