<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Plane</title>

  <script>
    const playStoreUrl =
      "https://play.google.com/store/apps/details?id=com.tomkogames.pixelplane";

    let seconds = 2;

    window.onload = () => {
      const counter = document.getElementById("counter");
      const button = document.getElementById("download");

      button.href = playStoreUrl;

      const interval = setInterval(() => {
        seconds--;
        counter.textContent = seconds;

        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = playStoreUrl;
        }
      }, 1000);
    };
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
      padding: 24px;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
    }

    .icon {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,.15);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 16px;
      margin-bottom: 28px;
    }

    .cta {
      display: block;
      width: 100%;
      padding: 22px;
      border-radius: 18px;
      background: #16a34a;
      color: white;
      text-decoration: none;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 8px 0 #166534;
    }

    .cta:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #166534;
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <main class="card">
    <img src="icon.png" class="icon" alt="Pixel Plane" />

    <h1>Pixel Plane</h1>

    <p>
      Redirection vers Google Play dans
      <strong><span id="counter">2</span>s</strong>.
    </p>

    <a id="download" class="cta" href="#">
      Télécharger
    </a>

    <p class="small">
      Si rien ne se passe, appuie sur le bouton.
    </p>
  </main>
</body>
</html>
