<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Pixel Plane</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;

      min-height: 100svh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 24px;

      font-family:
        Inter,
        system-ui,
        -apple-system,
        sans-serif;

      background:
        radial-gradient(
          circle at top,
          rgba(59, 130, 246, 0.18),
          transparent 35%
        ),
        linear-gradient(
          180deg,
          #111827 0%,
          #020617 100%
        );

      color: white;
      text-align: center;

      overflow: hidden;
    }

    .page {
      width: 100%;
      max-width: 420px;
    }

    .icon {
      width: clamp(180px, 48vw, 240px);
      height: clamp(180px, 48vw, 240px);

      object-fit: cover;

      border-radius: 46px;

      margin-bottom: 34px;

      box-shadow:
        0 30px 80px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.08);

      animation: float 3.5s ease-in-out infinite;
    }

    h1 {
      margin: 0 0 14px;

      font-size: clamp(38px, 11vw, 58px);
      line-height: 0.95;
      letter-spacing: -2px;
    }

    .subtitle {
      margin: 0 auto 38px;

      max-width: 320px;

      color: #cbd5e1;

      font-size: 17px;
      line-height: 1.6;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;

      width: 100%;

      padding: 16px 20px;

      border-radius: 22px;

      background:
        linear-gradient(
          180deg,
          rgba(37, 99, 235, 0.95),
          rgba(29, 78, 216, 0.95)
        );

      color: white;

      text-decoration: none;

      border: 1px solid rgba(255,255,255,0.12);

      box-shadow:
        0 12px 30px rgba(37, 99, 235, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.15);

      backdrop-filter: blur(12px);

      transition:
        transform 0.15s ease,
        box-shadow 0.15s ease;
    }

    .cta:hover {
      box-shadow:
        0 16px 40px rgba(37, 99, 235, 0.45),
        inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .cta:active {
      transform: scale(0.985);
    }

    .playstore-badge {
      width: 42px;
      height: 42px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .cta-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    .small {
      font-size: 11px;
      font-weight: 600;
      opacity: 0.8;
      line-height: 1;
    }

    .big {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }

    .footer {
      margin-top: 22px;

      font-size: 13px;
      color: #94a3b8;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <!-- Replace with your game icon -->
    <img
      class="icon"
      src="icon.png"
      alt="Pixel Plane icon"
    />

    <h1>Pixel Plane</h1>

    <p class="subtitle">
      Dodge obstacles, beat your high score
      and enjoy a fast retro arcade experience.
    </p>

    <a
      class="cta"
      href="https://play.google.com/store/apps/details?id=com.tomkogames.pixelplane"
      target="_blank"
      rel="noopener noreferrer"
    >

      <!-- Replace with playstore.png -->
      <img
        class="playstore-badge"
        src="playstore.png"
        alt="Google Play"
      />

      <div class="cta-text">
        <span class="small">GET IT ON</span>
        <span class="big">Google Play</span>
      </div>

    </a>

    <p class="footer">
      Free on Android
    </p>

  </main>

</body>
</html>
