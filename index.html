<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Plane</title>

  <script>
    const playStoreUrl =
      "https://play.google.com/store/apps/details?id=com.tomkogames.pixelplane";

    let seconds = 2;

    window.addEventListener("load", () => {
      const counter = document.getElementById("counter");
      const fallback = document.getElementById("fallback");

      fallback.href = playStoreUrl;

      const timer = setInterval(() => {
        seconds--;
        counter.textContent = seconds;

        if (seconds <= 0) {
          clearInterval(timer);
          window.location.href = playStoreUrl;
        }
      }, 1000);
    });
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(70, 130, 180, 0.25), transparent 35%),
        linear-gradient(180deg, #111827 0%, #030712 100%);
      color: #f9fafb;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-align: center;
    }

    .page {
      width: 100%;
      max-width: 420px;
      min-height: calc(100svh - 48px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .icon {
      width: clamp(170px, 48vw, 240px);
      height: clamp(170px, 48vw, 240px);
      border-radius: 42px;
      margin-bottom: 34px;
      object-fit: cover;
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.08);
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(34px, 10vw, 52px);
      line-height: 1;
      margin: 0 0 14px;
      letter-spacing: -1px;
    }

    .subtitle {
      margin: 0 0 30px;
      max-width: 320px;
      color: #cbd5e1;
      font-size: clamp(16px, 4vw, 18px);
      line-height: 1.5;
    }

    .loader {
      width: 100%;
      max-width: 280px;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      margin-bottom: 16px;
    }

    .loader span {
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      animation: loading 3s linear forwards;
      transform-origin: left;
    }

    .redirect {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 34px;
    }

    .fallback {
      display: inline-block;
      padding: 13px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(12px);
    }

    .fallback:active {
      transform: scale(0.97);
    }

    @keyframes loading {
      from {
        transform: scaleX(0);
      }
      to {
        transform: scaleX(1);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <img src="icon.png" class="icon" alt="Pixel Plane app icon" />

    <h1>Pixel Plane</h1>

    <p class="subtitle">
      Get ready to play. Redirecting you to Google Play.
    </p>

    <div class="loader">
      <span></span>
    </div>

    <p class="redirect">
      Automatic redirect in <strong><span id="counter">3</span>s</strong>
    </p>

    <a id="fallback" class="fallback" href="#">
      If automatic redirect does not work, click here
    </a>
  </main>
</body>
</html>
